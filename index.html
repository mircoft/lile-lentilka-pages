<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LiLiLentilka | Pripravujeme Nieco velke</title>
  <meta name="description" content="LiLiLentilka - pripravujeme nieco velke. Sledujte nas na socialnych sietach.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --brand-600: #f472b6;
      --brand-700: #fb8ac2;
      --brand-800: #fda4af;
      --ink-900: #1f2937;
      --ink-600: #4b5563;
      --surface: rgba(255, 255, 255, 0.88);
      --border: rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(at 40% 20%, hsla(228, 100%, 75%, 0.3) 0px, transparent 50%),
        radial-gradient(at 80% 0%, hsla(189, 100%, 56%, 0.25) 0px, transparent 50%),
        radial-gradient(at 0% 50%, hsla(355, 100%, 93%, 0.25) 0px, transparent 50%),
        radial-gradient(at 80% 50%, hsla(340, 100%, 76%, 0.25) 0px, transparent 50%),
        radial-gradient(at 0% 100%, hsla(22, 100%, 77%, 0.25) 0px, transparent 50%);
      background-color: #ffffff;
      color: var(--ink-900);
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 620px;
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(2, 6, 23, 0.12);
      padding: 44px 30px;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.1rem, 5vw, 3.1rem);
      margin: 0 0 12px;
      letter-spacing: 0.3px;
    }

    p {
      margin: 0;
      color: var(--ink-600);
      line-height: 1.6;
    }

    .socials {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .socials a {
      text-decoration: none;
      border: 1px solid rgba(244, 114, 182, 0.32);
      border-radius: 999px;
      padding: 10px 17px;
      color: #be185d;
      background: rgba(255, 255, 255, 0.92);
      font-weight: 700;
      transition: all 0.2s ease;
      box-shadow: 0 6px 18px rgba(244, 114, 182, 0.12);
    }

    .socials a:hover {
      background: linear-gradient(135deg, var(--brand-600), var(--brand-700) 55%, var(--brand-800));
      color: #fff;
      border-color: transparent;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main>
    <h1>Pripravujeme Nieco velke</h1>
    <p>Nova stranka LiLiLentilka je vo vyvoji.<br>Sledujte nas na socialnych sietach.</p>
    <div class="socials">
      <a href="https://www.facebook.com/share/1CT19Jecij/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer">Facebook</a>
      <a href="https://www.instagram.com/lili_lentilka?igsh=NGdpNHlrNTVoaXl1&utm_source=qr" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a href="https://www.youtube.com/@lililentilka?sub_confirmation=1" target="_blank" rel="noopener noreferrer">YouTube</a>
    </div>
  </main>
</body>
</html>
